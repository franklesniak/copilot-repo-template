# Azure Pipelines PowerShell validation.
#
# Azure Repos pull request validation is configured through branch policy build
# validation. This YAML intentionally omits a `pr:` trigger.

name: "$(Date:yyyyMMdd).$(Rev:r)"

trigger:
  branches:
    include:
      - "*"

parameters:
  - name: gateMode
    type: string
    default: "strict"

jobs:
  - job: lint
    displayName: "PSScriptAnalyzer"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      PSSCRIPTANALYZER_GATE_MODE: "${{ parameters.gateMode }}"
    steps:
      - checkout: self

      - task: PowerShell@2
        displayName: "Run PSScriptAnalyzer"
        inputs:
          pwsh: true
          targetType: "inline"
          script: |
            $ErrorActionPreference = 'Stop'
            Set-StrictMode -Version Latest
            $repositoryRoot = "$(Build.SourcesDirectory)"
            $settingsPath = Join-Path -Path $repositoryRoot -ChildPath ".github/linting/PSScriptAnalyzerSettings.psd1"
            $candidateHelperPath = Join-Path -Path $repositoryRoot -ChildPath "src/tools/Resolve-PSScriptAnalyzerCandidate.ps1"
            $gateHelperPath = Join-Path -Path $repositoryRoot -ChildPath "src/tools/Resolve-PSScriptAnalyzerGate.ps1"

            foreach ($requiredPath in @($settingsPath, $candidateHelperPath, $gateHelperPath)) {
              if (-not (Test-Path -LiteralPath $requiredPath -PathType Leaf)) {
                throw ("Required PowerShell lint dependency missing: {0}" -f $requiredPath)
              }
            }

            . $candidateHelperPath
            . $gateHelperPath

            $candidateRecords = @(Get-PSScriptAnalyzerCandidate -RepositoryRoot $repositoryRoot)
            $candidateSummary = Get-PSScriptAnalyzerCandidateSummary -Candidate $candidateRecords
            foreach ($summaryLine in @(ConvertTo-PSScriptAnalyzerCandidateSummaryLine -CandidateSummary $candidateSummary)) {
              Write-Output $summaryLine
            }

            foreach ($unsafeCandidate in @($candidateSummary.Unsafe)) {
              Write-Output (ConvertTo-PSScriptAnalyzerCandidateAzurePipelinesErrorCommand -Candidate $unsafeCandidate)
            }

            if ($candidateSummary.SummaryCounts.Unsafe -gt 0) {
              Write-Error "Unsafe PSScriptAnalyzer candidate path(s) found. See diagnostics and summary above."
              exit 1
            }

            if ($candidateSummary.SummaryCounts.Selected -eq 0) {
              Write-Output "Skipping PSScriptAnalyzer - no selected PowerShell analyzer inputs found."
              return
            }

            if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
            }
            Import-Module PSScriptAnalyzer

            $analyzerFindings = [System.Collections.Generic.List[object]]::new()
            foreach ($candidate in @($candidateSummary.Selected)) {
              $displayPath = ConvertTo-PSScriptAnalyzerCandidateSingleLineText -Value $candidate.RepositoryRelativePath
              Write-Output ("Analyzing: {0}" -f $displayPath)
              $analyzerFindings.AddRange(@(
                Invoke-ScriptAnalyzer -Path $candidate.EscapedAnalyzerPath -Settings $settingsPath
              ))
            }

            $gateResult = Resolve-PSScriptAnalyzerGate `
              -Mode $env:PSSCRIPTANALYZER_GATE_MODE `
              -AnalyzerFinding $analyzerFindings `
              -RepositoryRoot $repositoryRoot `
              -AnnotationFormat AzurePipelines

            foreach ($annotationCommand in $gateResult.AnnotationCommands) {
              Write-Output $annotationCommand
            }

            foreach ($summaryLine in $gateResult.SummaryLines) {
              Write-Output $summaryLine
            }

            if ($gateResult.ShouldFail) {
              Write-Error "PSScriptAnalyzer gate failed. See annotations and summary above."
              exit 1
            }

            Write-Output "PowerShell lint gate passed."

  - job: pester
    displayName: "Pester"
    strategy:
      matrix:
        linux:
          imageName: "ubuntu-latest"
        windows:
          imageName: "windows-latest"
        macos:
          imageName: "macos-latest"
    pool:
      vmImage: "$(imageName)"
    steps:
      - checkout: self

      - task: PowerShell@2
        displayName: "Run Pester tests"
        inputs:
          pwsh: true
          targetType: "inline"
          script: |
            if (-not (Get-Module -ListAvailable -Name Pester)) {
              Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -ErrorAction Stop
            }
            Import-Module Pester
            Invoke-Pester -Path "$(Build.SourcesDirectory)/tests/" -Output Detailed
