# Pre-commit CI Workflow
#
# Purpose: Run pre-commit hooks for Python and general file checks
# Runs on: push and pull_request events
#
# Workflow Dependencies:
# Other workflows (e.g., python-ci.yml) depend on this workflow via 'workflow_run'.
# This ensures that code is properly formatted and linted BEFORE running type checks
# and tests, preventing unnecessary CI failures and providing faster feedback on
# formatting/linting issues.
#
# Note: This workflow is optional. Remove if your project doesn't use Python.

name: Pre-commit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
