# =============================================================================
# TEMPLATE CUSTOMIZATION GUIDE
# =============================================================================
# This is a GitHub issue form template for documentation issues. When using this
# in a cloned repository, customize the following sections:
#
# 1. `labels` - Update to match your repository's label taxonomy. Ensure these
#    labels exist in your repository or update to match your repo's labels.
# 2. `title` - Adjust the "[Docs] " prefix if desired
# 3. `location.placeholder` - Uses blob/HEAD which works regardless of default branch name.
#    OWNER/REPO in the example should be understood as a placeholder format.
#
# Trade-off notes on `location` field being optional:
# - Optional (used here): Encourages drive-by typo reports with lower friction.
#   Some reports may be harder to act on without a specific location.
# - Required: More actionable for maintainers; may reduce submissions.
# Recommended: Keep optional but strongly encourage providing a link/path via
# the description text.
# =============================================================================

name: 📚 Documentation Issue
description: Report a typo, unclear instructions, broken link, or suggest documentation improvements
# CUSTOMIZE: Adjust the title prefix to match your project's conventions
title: "[Docs] "
# CUSTOMIZE: Update these labels to match your repository's label taxonomy.
# Ensure these labels exist in your repository or create them before using this template.
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation!

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues for this documentation problem
          required: true
        - label: This is a documentation issue (typo, unclear text, broken link), not a code bug
          required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong or missing?
      description: Describe the documentation issue clearly and concisely.
    validations:
      required: true

  # NOTE: Uses blob/HEAD which works regardless of default branch name.
  # The OWNER/REPO in the placeholder example is a format guide, not a literal value.
  - type: input
    id: location
    attributes:
      label: Where is it?
      description: >-
        Link to the file/section/page (URL or path) where the issue exists.
        Providing a location greatly speeds up investigation—please include if possible.
      placeholder: e.g., https://github.com/OWNER/REPO/blob/HEAD/README.md#usage or docs/guide.md
    validations:
      required: false

  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested change (optional)
      description: If you know what should change, propose wording/structure here.
    validations:
      required: false

  # CUSTOMIZE: Remove if your project doesn't maintain versioned documentation
  - type: input
    id: doc_version
    attributes:
      label: Documentation Version (optional)
      description: >-
        If the documentation is versioned, which version are you viewing?
      placeholder: e.g., v1.2.3, latest, main branch
    validations:
      required: false

  # CUSTOMIZE: Adjust options to match your project's documentation structure.
  # This field is optional by default. Downstream repos can make it required if
  # they do structured documentation triage.
  - type: dropdown
    id: doc_issue_type
    attributes:
      label: Issue Type (optional)
      description: What type of documentation issue is this?
      options:
        - Typo / Grammar
        - Unclear / Confusing
        - Missing Information
        - Broken Link
        - Outdated Information
        - Code Example Issue
        - Formatting / Rendering
        - Other
    validations:
      required: false
