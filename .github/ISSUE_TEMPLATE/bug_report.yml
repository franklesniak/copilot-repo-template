name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for reporting a bug!
        Please fill out the form below to help us investigate and resolve the issue.

        ⚠️ **Security Notice:** If you are reporting a security vulnerability, do NOT use this form. Please report security issues privately via the repository's Security tab or by following the instructions in SECURITY.md.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: >-
        Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the project documentation
          required: false
        - label: I am using a supported version of the project
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        Provide a clear and concise description of the bug
      placeholder: Describe what the bug is...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: >-
        Provide detailed steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: >-
        Describe what you expected to happen
      placeholder: What should have happened...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: >-
        Describe what actually happened
      placeholder: What actually happened...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Output
      description: >-
        Paste any error messages, stack traces, or relevant log output.
        For longer outputs, you can drag-and-drop log files into this field or attach them below.
        ⚠️ Review logs for sensitive data (passwords, tokens, personal info) before submitting
      placeholder: Paste logs here...
      render: console
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: >-
        If applicable, add screenshots to help explain the problem.
        Drag and drop images directly into this field, or paste image URLs
      placeholder: Drag and drop screenshots here...
    validations:
      required: false

  - type: input
    id: project_version
    attributes:
      label: Project Version
      description: >-
        The version of the project (e.g., v1.2.3 or commit SHA)
      placeholder: v1.2.3
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating System
      description: >-
        Your operating system name and version
      placeholder: e.g., Windows 11, Ubuntu 22.04, macOS Sonoma
    validations:
      required: true

  - type: textarea
    id: runtime_version
    attributes:
      label: Language/Runtime Version(s)
      description: >-
        Relevant language or runtime versions for your environment.
        List each on a separate line if multiple apply
      placeholder: |
        Python 3.12
        PowerShell 7.4
    validations:
      required: false

  - type: input
    id: shell_environment
    attributes:
      label: Shell/Terminal
      description: >-
        The shell or terminal you're using, if applicable
        (e.g., PowerShell 7.4, bash 5.2, Windows Terminal, iTerm2)
      placeholder: e.g., PowerShell 7.4, bash 5.2, Windows Terminal
    validations:
      required: false

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: >-
        How consistently can you reproduce this bug?
      options:
        - Consistent (every time)
        - Intermittent (sometimes)
        - Unable to reproduce reliably
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: >-
        How severe is the impact of this bug?
        ⚠️ For security vulnerabilities, do NOT use this form—report privately via the Security tab or SECURITY.md
      options:
        - Critical (system crash, data loss)
        - High (major feature broken, no workaround)
        - Medium (feature impaired, workaround exists)
        - Low (minor inconvenience, cosmetic issue)
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Possible Solution or Workaround
      description: >-
        If you have ideas on how to fix this or a workaround you're using,
        describe it here
      placeholder: Describe any workarounds or potential fixes...
    validations:
      required: false

  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: >-
        Link any related issues that may provide additional context
        (e.g., #123 for same-repo references or owner/repo-name#456 for cross-repo references)
      placeholder: |
        #123
        owner/repo-name#456
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: >-
        Add any other context about the problem here, such as configuration
        details or environment specifics
      placeholder: Add any other context here...
    validations:
      required: false
