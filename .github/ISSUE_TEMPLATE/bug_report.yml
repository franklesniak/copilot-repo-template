# =============================================================================
# TEMPLATE CUSTOMIZATION GUIDE
# =============================================================================
# This is a GitHub issue form template for bug reports. When using this in a
# cloned repository, customize the following sections:
#
# 1. `labels` - Update to match your repository's label taxonomy
# 2. `title` - Adjust the "[Bug] " prefix if desired
# 3. `assignees` - (Optional) Add this field to auto-assign bug reports to
#    specific users. Example: `assignees: [username1, username2]`
# 4. `projects` - (Optional) Add this field to auto-add bug reports to a
#    GitHub Project. Example (uses project number):
#    ```yaml
#    projects:
#      - org/1
#    ```
# 5. `pre_flight` checkboxes - Add or modify checkboxes for project-specific
#    requirements (e.g., "I have included a minimal reproduction repository"
#    for library projects, or "I have tested on the latest version")
# 6. `runtime_version.placeholder` - Update examples to match your project's
#    supported languages/runtimes
# 7. `shell_environment` - CLI-focused projects should keep this field;
#    others may remove it if not applicable
# 8. `severity` options - Adjust impact categories to match your project's
#    triage workflow (e.g., add/remove severity levels)
# 9. `field removal` - Any optional field can be removed entirely if not
#    applicable to your project. Required fields should generally be kept
#    to ensure sufficient information for bug triage.
# 10. `config.yml` - Create or update `.github/ISSUE_TEMPLATE/config.yml` to control
#     the issue template chooser (enable/disable blank issues, add contact links).
#     Example config.yml:
#     ```yaml
#     # Set to `true` for flexibility (recommended initially), or `false` once you
#     # have comprehensive templates and want to enforce structured issue creation
#     blank_issues_enabled: true
#     contact_links:
#       - name: 💬 Discussions
#         url: https://github.com/ORG/REPO/discussions
#         about: Ask questions and discuss ideas
#     ```
# 11. `required fields` - Mark fields required only when the information is essential
#     for triage. Over-requiring fields discourages bug reports. Recommended required:
#     description, steps to reproduce, expected/actual behavior, version, OS, severity.
# 12. `field IDs` - This template uses snake_case for all field IDs (e.g.,
#     `steps_to_reproduce`, `operating_system`). Maintain this convention
#     when adding new fields for consistency. IDs are used in issue body
#     output and API queries.
# 13. `type` - (Optional) Add this top-level field for issue type categorization.
#     Issue types are defined at the organization level in GitHub settings.
#     If your organization has defined issue types, you can specify one here.
#     Example: `type: Bug`
# 14. `required` validation limitation - Note that `required: true` validation
#     only works on public repositories. On private repositories, GitHub does
#     not enforce required field validation. Users of this template for private
#     repos should be aware that all fields will effectively be optional.
# =============================================================================

name: 🐛 Bug Report
description: Report a bug or unexpected behavior
# CUSTOMIZE: Adjust the title prefix to match your project's conventions
title: "[Bug] "
# CUSTOMIZE: Update these labels to match your repository's label taxonomy.
# Common patterns include:
#   - Type labels: bug, enhancement, documentation
#   - Status labels: triage, confirmed, in-progress
#   - Priority labels: priority:critical, priority:high, priority:medium, priority:low
#   - Area labels: area:api, area:cli, area:docs
labels:
  - bug
  - triage
# CUSTOMIZE: Uncomment and update to specify an issue type (defined at the organization level).
# See: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-issue-forms#top-level-syntax
# type: Bug
# CUSTOMIZE: Uncomment and update to pre-populate the assignees field when opening bug reports
# assignees:
#   - maintainer-username
# CUSTOMIZE: Uncomment and update to auto-add bug reports to a GitHub Project (uses project number)
# projects:
#   - org/1
body:
  # CUSTOMIZE: Relative links in issue form markdown may not resolve correctly
  # (e.g., ../../security resolves to https://github.com/security instead of
  # the repository's security tab). After cloning, test the links and update
  # to absolute links. For example:
  #   - https://github.com/franklesniak/copilot-repo-template/security
  #   - https://github.com/franklesniak/copilot-repo-template/blob/main/SECURITY.md
  - type: markdown
    attributes:
      value: |
        ## Thank you for reporting a bug!
        Please fill out the form below to help us investigate and resolve the issue.

        ⚠️ **Security Notice:** If you are reporting a security vulnerability, do NOT use this form. Please report security issues privately via the repository's <a>Security tab</a> or by following the instructions in <a>SECURITY.md</a>.

  - type: checkboxes
    id: pre_flight
    attributes:
      label: Pre-flight Checklist
      description: >-
        Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        # CUSTOMIZE: Consider changing to `required: true` for projects with
        # comprehensive documentation that users should consult before filing bugs
        - label: I have read the project documentation
          required: false
        - label: I am using a supported version of the project
          required: true
        - label: I have tested on the latest version or main branch
          required: false
        - label: This is NOT a security vulnerability (report those privately via SECURITY.md)
          required: true
        # CUSTOMIZE: Remove if your project doesn't accept community contributions
        - label: I am willing to submit a pull request to fix this issue
          required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        Provide a clear and concise description of the bug
      placeholder: Describe what the bug is...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: >-
        Provide detailed steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: >-
        Describe what you expected to happen
      placeholder: What should have happened...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: >-
        Describe what actually happened
      placeholder: What actually happened...
    validations:
      required: true

  - type: textarea
    id: logs_output
    attributes:
      label: Logs/Error Output
      description: >-
        Paste any error messages, stack traces, or relevant log output.
        For longer outputs, use a collapsible section or drag-and-drop log files.
        ⚠️ Review logs for sensitive data (passwords, tokens, personal info) before submitting
      placeholder: |
        Paste logs here...

        For verbose logs, use a collapsible section:
        <details><summary>Full log output</summary>

        Your detailed logs here...

        </details>
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: >-
        If applicable, add screenshots to help explain the problem.
        Drag and drop images directly into this field, or paste image URLs
      placeholder: Drag and drop screenshots here...
    validations:
      required: false

  # CUSTOMIZE: Library/framework projects should consider making this required.
  # Projects that don't accept external reproductions can remove this field.
  - type: input
    id: minimal_reproduction
    attributes:
      label: Minimal Reproduction URL
      description: >-
        Link to a minimal reproduction (GitHub repo, CodeSandbox, StackBlitz, etc.).
        For complex bugs, this greatly speeds up investigation.
      placeholder: e.g., https://github.com/username/repo-name or https://codesandbox.io/s/...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### Environment Information"

  # NOTE: GitHub issue forms do NOT support `pattern` validation on input fields.
  # See: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-githubs-form-schema#validations-for-input
  # For input validation, consider using a dropdown with predefined options,
  # or validate programmatically via GitHub Actions on issue creation.
  - type: input
    id: project_version
    attributes:
      label: Project Version
      description: >-
        The version of the project (e.g., v1.2.3 or commit SHA)
      placeholder: e.g., v1.2.3 or commit SHA abc1234
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating System
      description: >-
        Your operating system name and version
      placeholder: e.g., Windows 11, Ubuntu 24.04 LTS, macOS 15.x
    validations:
      required: true

  # CUSTOMIZE: Cross-platform projects should consider making this required.
  # Single-platform projects can remove this field.
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      description: >-
        Your CPU architecture, if relevant to the issue
      options:
        - x64 (AMD64 / Intel 64)
        - ARM64 (AArch64 / Apple Silicon)
        - x86 (32-bit)
        - Other (specify in Additional Context)
    validations:
      required: false

  # CUSTOMIZE: Update placeholder examples to match your project's supported runtimes
  - type: textarea
    id: runtime_version
    attributes:
      label: Language/Runtime Version(s)
      description: >-
        Relevant language or runtime versions for your environment.
        List each on a separate line if multiple apply
      placeholder: |
        e.g., Python 3.12, Node.js 20.x, .NET 8.0
    validations:
      required: false

  # CUSTOMIZE: CLI-focused projects should keep this field; others may remove it if not applicable
  - type: input
    id: shell_environment
    attributes:
      label: Shell/Terminal
      description: >-
        The shell or terminal you're using, if applicable
      placeholder: e.g., PowerShell 7.4, bash 5.2, Windows Terminal
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### Bug Characteristics"

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: >-
        How consistently can you reproduce this bug?
      options:
        - Consistent (every time)
        - Intermittent (sometimes)
        - Unable to reproduce reliably
        - Only happened once (haven't retried)
    validations:
      required: true

  # CUSTOMIZE: Remove this field if version history is not tracked or not relevant
  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      description: >-
        Did this functionality work correctly in a previous version?
      options:
        - Unknown - I haven't used previous versions
        - Yes - this worked before (please specify version in Additional Context)
        - No - this never worked for me
    validations:
      required: false

  # CUSTOMIZE: Adjust severity options to match your project's triage workflow
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: >-
        Select the severity level that best describes the impact from your perspective.
        Note: This is your self-assessment; maintainers may adjust during triage.
        ⚠️ For security vulnerabilities, do NOT use this form—report privately via the Security tab or SECURITY.md
      options:
        - Critical (system crash, data loss)
        - High (major feature broken, no workaround)
        - Medium (feature impaired, workaround exists)
        - Low (minor inconvenience, cosmetic issue)
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### Additional Information"

  - type: textarea
    id: workaround
    attributes:
      label: Possible Solution or Workaround
      description: >-
        If you have ideas on how to fix this or a workaround you're using,
        describe it here
      placeholder: Describe any workarounds or potential fixes...
    validations:
      required: false

  - type: textarea
    id: related_issues
    attributes:
      label: Related Issues
      description: >-
        Link any related issues that may provide additional context
        (e.g., #123 for same-repo references or owner/repo-name#456 for cross-repo references)
      placeholder: |
        #123
        owner/repo-name#456
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: >-
        Add any other context about the problem here, such as configuration
        details or environment specifics
      placeholder: Add any other context here...
    validations:
      required: false
