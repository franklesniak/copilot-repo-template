# Pre-commit configuration
# Install:  pip install pre-commit && pre-commit install
# Run:  pre-commit run --all-files
#
# Note: This file is optional.  Remove if your project doesn't use Python
# or if you prefer the Husky-based approach for markdown only.

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Python formatting (remove if not using Python)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100]

  # Python linting (remove if not using Python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [--fix, --line-length=100]
