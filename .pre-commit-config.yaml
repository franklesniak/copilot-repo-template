# ============================================================================
# CRITICAL: Pre-commit Discipline
# ============================================================================
# ALWAYS run `pre-commit run --all-files` before committing code.
#
# Pre-commit hooks are enforced in CI. Running locally prevents push failures
# and wasted CI cycles.
#
# Auto-fixes: When pre-commit modifies files (formatting, trailing whitespace,
# etc.), you MUST commit those fixes as part of the SAME commit as your code
# changes. Do NOT create separate "fix pre-commit" commits.
#
# CI is a safety net, not a substitute for local checks.
# ============================================================================

# Pre-commit configuration
# Install:  pip install pre-commit && pre-commit install
# Run:  pre-commit run --all-files
#
# Note: This file configures pre-commit hooks for all projects. It handles
# Python formatting/linting and Markdown validation. Remove only if your
# project does not use pre-commit at all.

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      # check-json validates strict JSON only. The anchored pattern below
      # excludes .jsonc; downstream repos that need JSONC validation should
      # add JSONC-aware tooling rather than retrofitting check-json.
      - id: check-json
        files: \.json$
      - id: check-added-large-files

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  # GitHub Actions workflow linting
  # Note: First-run hook environment setup may fail on restricted networks
  # (actionlint downloads a Go toolchain to build the binary). CI is the
  # shared enforcement environment, so contributors who hit a network
  # restriction locally can rely on CI to enforce this hook.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Python formatting (remove if not using Python)
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: [--line-length=100]

  # Python linting (remove if not using Python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --line-length=100]

  # JSON Schema validation
  #
  # This template ships a worked-example schema at
  # `schemas/example-config.schema.json` and example data files under
  # `schemas/examples/example-config/`. The hooks below validate:
  #   1. The valid example data files against the example schema.
  #   2. The example schema itself against its declared JSON Schema
  #      Draft 2020-12 metaschema (self-validation).
  #
  # Invalid example data files under
  # `schemas/examples/example-config/invalid/` are intentionally NOT wired
  # into a normal pre-commit hook because they are expected to fail
  # validation. They are exercised by `tests/test_schema_examples.py`,
  # which auto-discovers schema/example pairs and asserts that valid
  # examples pass and invalid examples fail.
  # See `schemas/README.md` for the canonical worked-example documentation
  # and downstream-removal checklist.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.1"
    hooks:
      - id: check-jsonschema
        name: Validate example-config valid examples
        files: ^schemas/examples/example-config/valid/.*\.json$
        args:
          - --schemafile
          - schemas/example-config.schema.json
      - id: check-metaschema
        name: Self-validate example-config schema
        files: ^schemas/example-config\.schema\.json$

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # Terraform formatting and validation (remove if not using Terraform)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
