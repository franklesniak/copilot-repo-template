# ============================================================================
# CRITICAL: Pre-commit Discipline
# ============================================================================
# ALWAYS run `pre-commit run --all-files` before committing code.
#
# Pre-commit hooks are enforced in CI. Running locally prevents push failures
# and wasted CI cycles.
#
# Auto-fixes: When pre-commit modifies files (formatting, trailing whitespace,
# etc.), you MUST commit those fixes as part of the SAME commit as your code
# changes. Do NOT create separate "fix pre-commit" commits.
#
# CI is a safety net, not a substitute for local checks.
# ============================================================================

# Pre-commit configuration
# Install:  pip install pre-commit && pre-commit install
# Run:  pre-commit run --all-files
#
# Note: This file configures pre-commit hooks for all projects. Module-specific
# hooks are wrapped in template-sync inline blocks so downstream repositories
# can remove unused language stacks while retaining the shared hook pipeline.

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      # check-json validates strict JSON only. The anchored pattern below
      # excludes .jsonc; downstream repos that need JSONC validation should
      # add JSONC-aware tooling rather than retrofitting check-json.
      - id: check-json
        files: \.json$
      # check-toml validates TOML syntax. Its built-in `types: [toml]`
      # already restricts the hook to *.toml, so no `files:` argument is
      # needed (and no anchored-pattern treatment like check-json above).
      - id: check-toml
      - id: check-added-large-files

  # template-sync: begin yaml-only
  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
  # template-sync: end yaml-only

  # GitHub Actions workflow linting
  # Note: First-run hook environment setup may fail on restricted networks
  # (actionlint downloads a Go toolchain to build the binary). CI is the
  # shared enforcement environment, so contributors who hit a network
  # restriction locally can rely on CI to enforce this hook.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # template-sync: begin python-only
  # Python formatting
  - repo: https://github.com/psf/black
    rev: 26.5.0
    hooks:
      - id: black
        args: [--line-length=100]

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix, --line-length=100]
  # template-sync: end python-only

  # JSON Schema validation is split by module ownership so downstream
  # repositories can strip module-specific hooks without affecting unrelated
  # validation surfaces.
  #
  # template-sync: begin schema-only
  # Schema-owned validation:
  #
  #   A. Project-owned schema example validation
  #      Validates the valid example data files under
  #      `schemas/examples/example-config/valid/` against the worked-example
  #      schema at `schemas/example-config.schema.json`, and the valid
  #      marker examples under `schemas/examples/template-sync-marker/valid/`
  #      against `schemas/template-sync-marker.schema.json`. See
  #      `schemas/README.md` for schema documentation and downstream-removal
  #      guidance.
  #
  #      Invalid example data files under `schemas/examples/*/invalid/` are
  #      intentionally NOT wired into a normal pre-commit hook because they
  #      are expected to fail validation. They are exercised by
  #      `tests/test_schema_examples.py`, which auto-discovers schema/example
  #      pairs and asserts that valid examples pass and invalid examples fail.
  #
  #   B. Schema self-validation
  #      Validates project-owned schemas against their declared JSON Schema
  #      Draft 2020-12 metaschema using `check-metaschema`.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.2"
    hooks:
      - id: check-jsonschema
        alias: validate-example-config-valid-examples
        name: Validate example-config valid examples
        files: ^schemas/examples/example-config/valid/.*\.json$
        args:
          - --schemafile
          - schemas/example-config.schema.json
      - id: check-jsonschema
        alias: validate-template-sync-marker-valid-examples
        name: Validate template sync marker valid examples
        files: ^schemas/examples/template-sync-marker/valid/.*\.yml$
        args:
          - --schemafile
          - schemas/template-sync-marker.schema.json
      - id: check-metaschema
        alias: validate-example-config-schema
        name: Self-validate example-config schema
        files: ^schemas/example-config\.schema\.json$
      - id: check-metaschema
        alias: validate-template-sync-manifest-schema
        name: Self-validate template-sync-manifest schema
        files: ^schemas/template-sync-manifest\.schema\.json$
      - id: check-metaschema
        alias: validate-template-sync-marker-schema
        name: Self-validate template-sync-marker schema
        files: ^schemas/template-sync-marker\.schema\.json$
  # template-sync: end schema-only

  # template-sync: begin schema-template-sync-support-only
  # Joint schema + template-sync-support validation:
  #
  #   A. Template sync manifest validation
  #      Validates `.template-sync/manifest.yml` against
  #      `schemas/template-sync-manifest.schema.json`. The manifest is the
  #      source-of-truth module taxonomy for downstream template syncs.
  #
  #   B. Template sync marker validation
  #      Validates `.template-sync/marker.yml` against
  #      `schemas/template-sync-marker.schema.json`. This repository does not
  #      need to carry a marker, but downstream repositories that adopt one
  #      get validation automatically when the marker file is present.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.2"
    hooks:
      - id: check-jsonschema
        alias: validate-template-sync-manifest
        name: Validate template sync manifest
        files: ^\.template-sync/manifest\.yml$
        args:
          - --schemafile
          - schemas/template-sync-manifest.schema.json
      - id: check-jsonschema
        alias: validate-template-sync-marker
        name: Validate template sync marker
        files: ^\.template-sync/marker\.yml$
        args:
          - --schemafile
          - schemas/template-sync-marker.schema.json
  # template-sync: end schema-template-sync-support-only

  # template-sync: begin github-platform-only
  # GitHub platform schema validation:
  #
  #   A. Real load-bearing repository configuration validation
  #      Validates real, load-bearing configuration files against built-in
  #      vendor schemas shipped with `check-jsonschema`. Built-in schemas
  #      do not require network access at hook runtime; they are bundled
  #      in the `check-jsonschema` package itself.
  #
  #      Currently wired:
  #        - `.github/dependabot.yml` against `vendor.dependabot`.
  #
  #      Evaluated but NOT currently wired (no verified built-in schema
  #      available in the pinned `check-jsonschema` version below; the
  #      `--builtin-schema` catalog reported by `check-jsonschema --help`
  #      does not include the candidate names noted here):
  #        - `.pre-commit-config.yaml` — no `vendor.pre-commit-config`
  #          builtin schema is shipped. pre-commit itself enforces the
  #          file's structure when it loads its configuration, so an
  #          additional schema check would have minimal marginal value
  #          even if one became available.
  #        - `package.json` — no `vendor.package` (or equivalent) builtin
  #          schema is shipped. npm validates this file when it parses
  #          dependency manifests, so it is not unguarded.
  #        - `.markdownlint.jsonc` — no `vendor.markdownlint` builtin
  #          schema is shipped. The file is intentionally JSONC (it
  #          contains comments); it MUST NOT be converted to strict JSON
  #          merely to satisfy a validator. markdownlint's own config
  #          loader remains the enforcement mechanism for this file.
  #        - `.yamllint.yml` — no `vendor.yamllint` builtin schema is
  #          shipped. The file MUST NOT be weakened to satisfy an
  #          incomplete external schema; yamllint itself enforces its
  #          configuration shape when it loads `.yamllint.yml`.
  #
  #      If a future `check-jsonschema` release adds builtin schemas for
  #      any of the above, add a narrowly scoped hook with an anchored
  #      `files:` pattern at that time. Do not vendor third-party
  #      schemas into this repository to fill the gap.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.2"
    hooks:
      - id: check-jsonschema
        alias: validate-dependabot-config
        name: Validate Dependabot configuration
        files: ^\.github/dependabot\.yml$
        args:
          - --builtin-schema
          - vendor.dependabot
  # template-sync: end github-platform-only

  # template-sync: begin markdown-only
  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
  # template-sync: end markdown-only

  # template-sync: begin terraform-only
  # Terraform formatting and validation.
  #
  # These repo-local Python wrappers avoid POSIX shell assumptions so the
  # hooks run consistently from native Windows / PowerShell, WSL/Linux, and
  # macOS.
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform fmt
        entry: python .github/scripts/terraform_hooks.py fmt
        language: python
        pass_filenames: false
        files: '(^|/)([^/]+\.(tf|tfvars|tftest\.hcl|tf\.json)$|templates/terraform/)'
      - id: terraform-validate
        name: Terraform validate
        entry: python .github/scripts/terraform_hooks.py validate
        language: python
        pass_filenames: false
        files: '(^|/)[^/]+\.tf(\.json)?$'
      - id: terraform-tflint
        name: Terraform validate with tflint
        entry: python .github/scripts/terraform_hooks.py tflint
        language: python
        pass_filenames: false
        files: '(^|/)([^/]+\.tf(\.json)?|\.tflint\.hcl)$'
  # template-sync: end terraform-only
